<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Garden | Purple Sanctuary</title>
    <style>
        /* --- 1. DYNAMIC CSS VARIABLES FOR DAY AND NIGHT --- */
        :root {
            --primary-purple: #9333ea;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            
            /* House Base Palette */
            --house-siding: #d5cfc9; 
            --house-roof: #8a8d91;   
            --house-trim: #ffffff;   
            --house-door: #87cefa;   
            --house-brick: #b05e4a;  
        }

        /* Default is Night Mode (Moonlight Garden) */
        body {
            --sky-top: #0a0b1a;
            --sky-bottom: #1a1025;
            --celestial-body: #fffafa;
            --celestial-glow: #e9d5ff;
            --window-color: #ffdf73;
            --window-glow: #ffdf73;
            --grass-top: #0f2b14;
            --grass-bottom: #051408;
            --path-top: #4a332a;
            --path-bottom: #2a1b16;
            --text-color: #f5d0fe;
            --nav-text: #ffffff;
            --tulip-glow-alpha: 0.6;
            
            background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Prevents scrolling so it acts like an app */
            user-select: none;
            transition: background 2s ease, color 2s ease;
        }

        /* Day Mode (Sunshine Garden) */
        body.day-mode {
            --sky-top: #6db3f2;
            --sky-bottom: #f5d0fe;
            --celestial-body: #ffdf73;
            --celestial-glow: #ffffff;
            --window-color: #87ceeb;
            --window-glow: transparent;
            --grass-top: #4ade80;
            --grass-bottom: #16a34a;
            --path-top: #a07865;
            --path-bottom: #735041;
            --text-color: #4a044e;
            --nav-text: #4a044e;
            --tulip-glow-alpha: 0;
        }

        /* --- 2. RESPONSIVE NAVIGATION & HELPER TEXT --- */
        nav {
            position: fixed;
            top: 2vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 12px 30px;
            border-radius: 50px;
            z-index: 1000;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 85%;
            max-width: 600px;
        }

        nav a {
            text-decoration: none;
            color: var(--nav-text);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            white-space: nowrap;
        }

        nav a:hover { color: var(--primary-purple); }

        .helper-text {
            position: fixed;
            top: 10vh;
            width: 90%;
            text-align: center;
            color: var(--text-color);
            opacity: 0.8;
            font-size: 1rem;
            font-style: italic;
            z-index: 999;
            pointer-events: none;
            transition: color 2s ease;
        }

        /* --- 3. CELESTIAL BODY (Moon or Sun) --- */
        .celestial-container {
            position: absolute;
            top: 15vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 2;
        }

        .celestial-orb {
            width: 120px;
            height: 120px;
            background: var(--celestial-body);
            border-radius: 50%;
            box-shadow: 0 0 40px var(--celestial-glow), inset 0 0 20px rgba(255,255,255,0.5);
            animation: breatheOrb 8s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            transition: background 2s ease, box-shadow 2s ease;
        }

        .orb-text {
            color: #4a044e;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 0.95rem;
            opacity: 0.8;
            transition: opacity 2s ease;
            line-height: 1.2;
        }

        @keyframes breatheOrb {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.2); }
        }

        /* --- 4. FUTURE HOUSE --- */
        .house-wrapper {
            position: absolute;
            bottom: 35vh; 
            left: 50%;
            transform: translateX(-50%) scale(1.4);
            transform-origin: bottom center;
            width: 260px;
            height: 160px;
            z-index: 5;
            transition: filter 2s ease;
        }

        .chimney { position: absolute; right: 45px; bottom: 120px; width: 20px; height: 60px; background: var(--house-brick); border: 1px solid rgba(0,0,0,0.2); z-index: 1; }
        .main-roof { position: absolute; top: 20px; left: 0; width: 260px; height: 60px; background: var(--house-roof); clip-path: polygon(25% 0, 75% 0, 100% 100%, 0 100%); z-index: 2; border-bottom: 4px solid var(--house-trim); }
        .dormer { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 80px; height: 45px; background: var(--house-siding); z-index: 3; border: 2px solid rgba(0,0,0,0.1); }
        .dormer-roof { position: absolute; top: -20px; left: -10px; width: 100px; height: 20px; background: var(--house-roof); clip-path: polygon(50% 0, 100% 100%, 0 100%); border-bottom: 2px solid var(--house-trim); }
        
        .dormer-win, .main-win {
            background: var(--window-color);
            border: 2px solid var(--house-trim);
            box-shadow: 0 0 15px var(--window-glow);
            transition: background 2s ease, box-shadow 2s ease;
        }

        .dormer-win { position: absolute; bottom: 5px; width: 16px; height: 25px; }
        .dormer-win.left { left: 15px; } .dormer-win.right { right: 15px; }
        
        .house-body { position: absolute; bottom: 0; left: 15px; width: 230px; height: 80px; background: var(--house-siding); z-index: 3; display: flex; justify-content: center; align-items: flex-end; border-left: 1px solid rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.1); }
        .door { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 60px; background: var(--house-door); border: 3px solid var(--house-trim); border-bottom: none; }
        
        .main-win { position: absolute; bottom: 15px; width: 26px; height: 40px; border-width: 3px; }
        .main-win.w1 { left: 20px; } .main-win.w2 { left: 55px; } .main-win.w3 { right: 55px; } .main-win.w4 { right: 20px; }
        
        .porch-roof { position: absolute; bottom: 80px; left: -5px; width: 270px; height: 20px; background: var(--house-roof); clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); z-index: 6; border-bottom: 3px solid var(--house-trim); }
        .porch-base { position: absolute; bottom: 0; left: 10px; width: 240px; height: 10px; background: #e0e0e0; z-index: 6; }
        .column { position: absolute; bottom: 10px; width: 20px; height: 70px; z-index: 6; display: flex; flex-direction: column; align-items: center; }
        .col-top { width: 10px; height: 40px; background: var(--house-trim); }
        .col-base { width: 20px; height: 30px; background: var(--house-brick); }
        .col1 { left: 15px; } .col2 { left: 80px; } .col3 { right: 80px; } .col4 { right: 15px; }
        .stairs { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 50px; height: 15px; background: var(--house-brick); z-index: 7; border-top: 2px solid #fff; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2); }

        /* --- 5. GARDEN LANDSCAPE --- */
        .garden-landscape {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh;
            background: linear-gradient(to bottom, var(--grass-top), var(--grass-bottom));
            z-index: 10;
            transition: background 2s ease;
        }

        .grass-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(ellipse at center, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at center, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            background-size: 40px 40px, 30px 30px;
            background-position: 0 0, 15px 15px;
            pointer-events: none;
        }

        .garden-path {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 100%;
            background: linear-gradient(to bottom, var(--path-top), var(--path-bottom));
            clip-path: polygon(35% 0, 65% 0, 100% 100%, 0 100%);
            z-index: 11;
            transition: background 2s ease;
        }

        .picket-fence {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="80" viewBox="0 0 40 80"><path fill="%23ffffff" opacity="0.95" d="M10 0 L30 0 L30 80 L10 80 Z M0 20 L40 20 L40 30 L0 30 Z M0 50 L40 50 L40 60 L0 60 Z"/></svg>');
            background-repeat: repeat-x;
            z-index: 30;
            filter: drop-shadow(0 -5px 10px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        /* --- 6. TULIPS & FLOATING THOUGHTS --- */
        .planted-tulip {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: growTulip 1s ease-out forwards, gentleSway 4s ease-in-out infinite alternate;
            z-index: 15;
            pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(147, 51, 234, var(--tulip-glow-alpha)));
            transition: filter 2s ease;
        }

        @keyframes growTulip {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes gentleSway {
            0% { transform: rotate(-4deg); }
            100% { transform: rotate(4deg); }
        }

        .floating-thought {
            position: absolute;
            color: var(--text-color);
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            font-style: italic;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 0 0 8px var(--primary-purple);
            animation: floatUp 4s ease-in forwards;
            z-index: 50;
            transition: color 2s ease;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1); }
            80% { opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        /* --- 7. PARTICLES (Fireflies / Sunlight motes) --- */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 25;
        }

        /* --- 8. BOUQUET AND MODAL --- */
        .bouquet-card {
            position: absolute;
            bottom: 12vh;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            text-align: center;
            z-index: 40;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 350px;
        }

        .bouquet-card p {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--text-color);
            font-style: italic;
        }

        .bouquet-flowers {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .bouquet-tulip {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .bouquet-tulip:hover {
            transform: scale(1.2) translateY(-5px);
            filter: drop-shadow(0 0 15px var(--primary-purple));
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: #fffafa; 
            width: 85%;
            max-width: 400px;
            border-radius: 20px;
            padding: 35px 25px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            color: #4a044e;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-overlay.active { opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h2 { font-family: 'Georgia', serif; color: #9333ea; margin-top: 0; border-bottom: 1px solid rgba(147, 51, 234, 0.2); padding-bottom: 10px; font-size: 1.4rem; }
        .modal-content p { line-height: 1.6; font-size: 1rem; font-style: italic; margin-bottom: 0; text-align: justify; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; color: #aaa; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: #9333ea; }

        /* --- 9. MOBILE SPECIFIC SCALING --- */
        @media (max-width: 600px) {
            nav { padding: 10px 15px; gap: 10px; }
            nav a { font-size: 0.75rem; }
            .helper-text { font-size: 0.85rem; top: 12vh; }
            .celestial-container { top: 18vh; }
            .celestial-orb { width: 100px; height: 100px; padding: 10px; }
            .orb-text { font-size: 0.85rem; }
            .house-wrapper { transform: translateX(-50%) scale(0.9); bottom: 35vh; }
            .bouquet-card { padding: 10px 15px; bottom: 10vh; width: 85%; }
            .bouquet-tulip { font-size: 2.2rem; }
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="story.html">Our Story</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Gallery</a>
        <a href="plans.html">Future</a>
        <a href="open-when.html">Open When</a>
        <a href="cycle.html">Cycle</a>
        <a href="garden.html">The Garden</a>
    </nav>

    <div class="helper-text">Tap the grass to plant purple tulips in our future garden my love</div>

    <canvas id="particles"></canvas>

    <div class="celestial-container">
        <div class="celestial-orb">
            <span class="orb-text" id="breatheText">Breathe in lovey</span>
        </div>
    </div>

    <div class="house-wrapper">
        <div class="chimney"></div>
        <div class="main-roof"></div>
        <div class="dormer">
            <div class="dormer-roof"></div>
            <div class="dormer-win left"></div>
            <div class="dormer-win right"></div>
        </div>
        <div class="house-body">
            <div class="main-win w1"></div>
            <div class="main-win w2"></div>
            <div class="door"></div>
            <div class="main-win w3"></div>
            <div class="main-win w4"></div>
        </div>
        <div class="porch-roof"></div>
        <div class="column col1"><div class="col-top"></div><div class="col-base"></div></div>
        <div class="column col2"><div class="col-top"></div><div class="col-base"></div></div>
        <div class="column col3"><div class="col-top"></div><div class="col-base"></div></div>
        <div class="column col4"><div class="col-top"></div><div class="col-base"></div></div>
        <div class="porch-base"></div>
        <div class="stairs"></div>
    </div>

    <div class="garden-landscape" id="garden-zone">
        <div class="grass-texture"></div>
        <div class="garden-path" id="garden-path"></div>
    </div>
    
    <div class="picket-fence"></div>

    <div class="bouquet-card">
        <p>Your special bouquet</p>
        <div class="bouquet-flowers">
            <div class="bouquet-tulip" onclick="openNote(0)">🌷</div>
            <div class="bouquet-tulip" onclick="openNote(1)">🌷</div>
            <div class="bouquet-tulip" onclick="openNote(2)">🌷</div>
        </div>
    </div>

    <div class="modal-overlay" id="noteModal" onclick="closeNote()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeNote()">✖</span>
            <div id="note-body"></div>
        </div>
    </div>

    <script>
        // --- 1. REAL TIME DAY/NIGHT LOGIC ---
        let breathePhases = [];
        let isDayTime = false;

        function updateTimeMode() {
            const hour = new Date().getHours();
            // Day time is between 6 AM and 5:59 PM
            isDayTime = (hour >= 6 && hour < 18);
            
            if (isDayTime) {
                document.body.classList.add('day-mode');
                breathePhases = ["Breathe in the sunshine lovey", "Hold it right there baby", "Breathe out gently"];
            } else {
                document.body.classList.remove('day-mode');
                breathePhases = ["Breathe in the moonlight lovey", "Hold it right there baby", "Breathe out gently"];
            }
        }
        
        updateTimeMode(); // Run immediately
        setInterval(updateTimeMode, 60000); // Check every minute to automatically shift

        // --- 2. BREATHING ORB LOGIC ---
        const breatheText = document.getElementById('breatheText');
        let phaseIndex = 0;

        // Initialize first text
        breatheText.innerText = breathePhases[0];

        setInterval(() => {
            breatheText.style.opacity = 0;
            setTimeout(() => {
                phaseIndex = (phaseIndex + 1) % breathePhases.length;
                breatheText.innerText = breathePhases[phaseIndex];
                breatheText.style.opacity = 1;
            }, 1000); 
        }, 4000); 

        // --- 3. BOUQUET NOTES LOGIC ---
        const notes = [
            `<h2>My solace</h2><p>Whenever college gets too heavy, please remember I am right here to help you carry it baby. You never have to do this alone. I see how hard you work and I am so incredibly proud of you. Take a deep breath and let your worries melt away here. You are my solace, and I will always be yours.</p>`,
            `<h2>My gorgeous girl</h2><p>You are the absolute most beautiful part of my day, my pretty baby. Just looking at your smile makes everything in my world perfectly fine. No matter how stressful things get out there, knowing I get to call you mine makes me the luckiest guy alive. Please never forget how much I adore you.</p>`,
            `<h2>My forever love</h2><p>I will always be your safe place sweetheart. Take all the quiet time you need right here in your garden. Plant as many flowers as you want and just let yourself breathe. I will be patiently waiting for you whenever you are ready to face the world again. We are in this together forever.</p>`
        ];

        const modal = document.getElementById('noteModal');
        const noteBody = document.getElementById('note-body');

        function openNote(index) {
            noteBody.innerHTML = notes[index];
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); }, 10);
        }

        function closeNote() {
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        // --- 4. PLANTING TULIPS LOGIC ---
        const sweetThoughts = [
            "I love you so much",
            "You are absolutely gorgeous",
            "My pretty baby",
            "Everything will be okay",
            "Take a deep breath lovey",
            "My sweet princess",
            "I am so incredibly proud of you",
            "You mean the world to me",
            "My beautiful future bride",
            "Keep smiling cutie",
            "You are my peace"
        ];

        const colors = ['#9333ea', '#701a75', '#d8b4fe', '#a855f7', '#c084fc'];
        const gardenZone = document.getElementById('garden-zone');
        
        function plantTulip(x, y, isInitial = false) {
            const gardenRect = gardenZone.getBoundingClientRect();
            
            // Calculate depth scale so flowers closer to the bottom are bigger
            const depthRatio = (y - gardenRect.top) / gardenRect.height; 
            const scale = 0.5 + depthRatio * 0.9; 

            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.left = x + 'px';
            wrapper.style.top = y + 'px';
            wrapper.style.zIndex = Math.floor(y); 
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.pointerEvents = 'none';

            const tulip = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            tulip.setAttribute("viewBox", "0 0 50 150");
            tulip.style.position = 'absolute';
            tulip.style.bottom = '0';
            tulip.style.left = '-25px'; 
            tulip.style.width = '50px';
            tulip.style.height = '150px';
            tulip.style.transformOrigin = 'bottom center';
            
            const randomSpeed = 3 + Math.random() * 2;
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            tulip.style.animation = `growTulip 1s ease-out forwards, gentleSway ${randomSpeed}s ease-in-out infinite alternate`;
            tulip.classList.add('planted-tulip');
            
            tulip.innerHTML = `
                <path d="M25 150 Q25 100 25 50" stroke="#4ade80" stroke-width="3" fill="none" />
                <path d="M25 120 Q40 100 25 80" fill="#22c55e" opacity="0.8" />
                <path d="M25 10 C10 10 5 40 25 65 C45 40 40 10 25 10 Z" fill="${randomColor}" />
            `;
            
            wrapper.appendChild(tulip);
            document.body.appendChild(wrapper);

            if (!isInitial) {
                const thought = document.createElement('div');
                thought.classList.add('floating-thought');
                thought.innerText = sweetThoughts[Math.floor(Math.random() * sweetThoughts.length)];
                thought.style.left = x + 'px';
                thought.style.top = (y - 120 * scale) + 'px';
                thought.style.transform = 'translateX(-50%)';
                document.body.appendChild(thought);
                
                setTimeout(() => { thought.remove(); }, 4000);
            }
        }

        // Handle user clicks to plant
        gardenZone.addEventListener('click', function(e) {
            if (e.target.id === 'garden-path') return;
            plantTulip(e.clientX, e.clientY, false);
        });

        // Pre-plant flowers beautifully along the sides
        window.addEventListener('DOMContentLoaded', () => {
            const gardenRect = gardenZone.getBoundingClientRect();
            
            for (let i = 0; i < 60; i++) {
                let y = Math.random() * gardenRect.height;
                let depthFactor = y / gardenRect.height;
                
                let pathHalfWidth = 35 + depthFactor * 80; 
                let center = window.innerWidth / 2;
                let x = Math.random() * window.innerWidth;
                
                if (x > center - pathHalfWidth && x < center + pathHalfWidth) {
                    x = (Math.random() > 0.5) 
                        ? center - pathHalfWidth - Math.random() * 40 
                        : center + pathHalfWidth + Math.random() * 40;
                }
                
                x = Math.max(20, Math.min(window.innerWidth - 20, x));
                plantTulip(x, gardenRect.top + y, true);
            }
        });

        // --- 5. DYNAMIC PARTICLES (Fireflies or Sun Motes) ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let flies = [];
        let mouseX = null;
        let mouseY = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.speedY = Math.random() * 0.8 - 0.4;
                this.brightness = Math.random();
                this.fade = Math.random() * 0.02 + 0.005;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                this.brightness += this.fade;
                if (this.brightness >= 1 || this.brightness <= 0) {
                    this.fade = -this.fade;
                }

                if (mouseX !== null && mouseY !== null) {
                    let dx = mouseX - this.x;
                    let dy = mouseY - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        this.x += dx * 0.01;
                        this.y += dy * 0.01;
                    }
                }

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                // Yellow fireflies at night, white glowing motes during the day
                if (isDayTime) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`; 
                    ctx.shadowColor = '#ffffff';
                } else {
                    ctx.fillStyle = `rgba(255, 223, 128, ${this.brightness})`; 
                    ctx.shadowColor = '#ffdf73';
                }
                
                ctx.shadowBlur = 8;
                ctx.fill();
            }
        }

        for (let i = 0; i < 70; i++) {
            flies.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < flies.length; i++) {
                flies[i].update();
                flies[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();

        document.body.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.body.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        document.body.addEventListener('mouseleave', () => { mouseX = null; mouseY = null; });
        document.body.addEventListener('touchend', () => { mouseX = null; mouseY = null; });

    </script>
</body>
</html>
